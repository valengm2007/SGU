<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SIU Guaraní - Docentes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- Topbar -->
<header class="bg-blue-900 text-white flex items-center justify-between px-6 py-3">
  <h1 class="text-lg font-semibold">SIU Guaraní - Panel Docente</h1>
  <div class="flex items-center gap-4">
    <span>Prof. García</span>
    <button class="bg-blue-700 px-3 py-1 rounded hover:bg-blue-600">
      Cerrar sesión
    </button>
  </div>
</header>

<div class="flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-md h-screen p-4">
    <nav class="space-y-2">

      <a href="#" class="block p-2 rounded hover:bg-gray-200">
        Mis materias
      </a>

      <a href="#" class="block p-2 rounded hover:bg-gray-200">
        Comisiones
      </a>

      <a href="#" class="block p-2 rounded hover:bg-gray-200">
        Cargar notas
      </a>

      <a href="#" class="block p-2 rounded hover:bg-gray-200">
        Actas
      </a>

      <a href="#" class="block p-2 rounded hover:bg-gray-200">
        Asistencias
      </a>

    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8">

    <h2 class="text-2xl font-bold mb-6">
      Comisión: Programación I
    </h2>

    <!-- Tabla alumnos -->
    <div class="bg-white shadow rounded-lg overflow-hidden">

      <table class="w-full">

        <thead class="bg-gray-200 text-left">
          <tr>
            <th class="p-3">Legajo</th>
            <th class="p-3">Alumno</th>
            <th class="p-3">Parcial 1</th>
            <th class="p-3">Parcial 2</th>
            <th class="p-3">Condición</th>
          </tr>
        </thead>

        <tbody>

          <tr class="border-t">
            <td class="p-3">12345</td>
            <td class="p-3">Juan Pérez</td>
            <td class="p-3">
              <input type="number" class="border rounded px-2 py-1 w-20">
            </td>
            <td class="p-3">
              <input type="number" class="border rounded px-2 py-1 w-20">
            </td>
            <td class="p-3">
              <select class="border rounded px-2 py-1">
                <option>Regular</option>
                <option>Promociona</option>
                <option>Libre</option>
              </select>
            </td>
          </tr>

          <tr class="border-t">
            <td class="p-3">12346</td>
            <td class="p-3">María López</td>
            <td class="p-3">
              <input type="number" class="border rounded px-2 py-1 w-20">
            </td>
            <td class="p-3">
              <input type="number" class="border rounded px-2 py-1 w-20">
            </td>
            <td class="p-3">
              <select class="border rounded px-2 py-1">
                <option>Regular</option>
                <option>Promociona</option>
                <option>Libre</option>
              </select>
            </td>
          </tr>

        </tbody>

      </table>

    </div>

    <div class="mt-6">
      <button class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-500">
        Guardar notas
      </button>
    </div>

  </main>

</div>

</body>
</html>
